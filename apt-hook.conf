// Rebuild kwin-pretile-restore after an APT transaction. Post-Invoke fires on
// every apt run, so the runner self-gates on the KWin version and is a no-op
// unless KWin actually changed. Wrapped so a failure never breaks apt.
DPkg::Post-Invoke { "if [ -x /usr/local/lib/kwinpretilerestore/rebuild-hook.sh ]; then /usr/local/lib/kwinpretilerestore/rebuild-hook.sh || true; fi"; };
